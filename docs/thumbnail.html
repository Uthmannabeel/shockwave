<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
  *{margin:0;box-sizing:border-box}
  html,body{width:1280px;height:720px;overflow:hidden}
  body{background:#07090F;font-family:'Space Grotesk',sans-serif;color:#ECF1FB;position:relative}
  .glow{position:absolute;inset:0;z-index:0;
    background:radial-gradient(560px 420px at 84% 30%, rgba(224,71,158,.22), transparent 60%),
               radial-gradient(520px 380px at 96% 78%, rgba(47,230,214,.14), transparent 60%),
               radial-gradient(480px 360px at 8% 10%, rgba(255,180,84,.12), transparent 60%)}
  .grid{position:absolute;inset:0;z-index:0;opacity:.05;
    background-image:linear-gradient(#fff 1px,transparent 1px),linear-gradient(90deg,#fff 1px,transparent 1px);
    background-size:44px 44px}
  .wrap{position:relative;z-index:2;height:100%;display:flex;align-items:center}
  .left{padding:0 0 0 72px;width:660px}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:15px;letter-spacing:.22em;text-transform:uppercase;
    color:#9BA7C2;display:flex;align-items:center;gap:10px;margin-bottom:26px}
  .eyebrow b{background:linear-gradient(100deg,#FFB454,#FF5C6C 50%,#E0479E);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:700;letter-spacing:.14em}
  h1{font-size:74px;line-height:1.02;letter-spacing:-.025em;font-weight:700}
  .grad{background:linear-gradient(100deg,#FFB454,#FF5C6C 45%,#E0479E);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{font-size:23px;color:#AEB8D0;margin-top:22px;max-width:560px;line-height:1.4}
  .chips{display:flex;flex-wrap:wrap;gap:11px;margin-top:30px;max-width:560px}
  .chip{font-family:'JetBrains Mono',monospace;font-size:14px;color:#CBD5EE;border:1px solid #26324F;
    background:rgba(255,255,255,.03);border-radius:30px;padding:8px 15px}
  .chip.cy{color:#2FE6D6;border-color:rgba(47,230,214,.4)}
  .chip.am{color:#FFB454;border-color:rgba(255,180,84,.4)}
  .foot{position:absolute;left:72px;bottom:46px;z-index:3;display:flex;align-items:center;gap:16px}
  .mark{font-weight:700;font-size:24px;letter-spacing:.14em}
  .mark b{background:linear-gradient(100deg,#FFB454,#FF5C6C 50%,#E0479E);-webkit-background-clip:text;background-clip:text;color:transparent}
  .meta{font-family:'JetBrains Mono',monospace;font-size:13px;color:#5F6B88;letter-spacing:.06em}
  svg#map{position:absolute;right:-40px;top:0;width:620px;height:720px;z-index:1}
  .badge{position:absolute;right:96px;top:84px;z-index:3;display:flex;align-items:center;gap:10px;
    background:rgba(8,12,22,.8);border:1px solid rgba(255,92,108,.5);border-radius:30px;padding:9px 18px;
    box-shadow:0 0 30px rgba(255,92,108,.25)}
  .badge .b{font-weight:700;font-size:16px;color:#FF5C6C;letter-spacing:.04em}
  .badge .s{font-family:'JetBrains Mono',monospace;font-size:13px;color:#9BA7C2}
</style></head>
<body>
  <div class="glow"></div><div class="grid"></div>
  <svg id="map"></svg>
  <div class="badge"><span class="b">HIGH RISK</span><span class="s">100/100</span></div>
  <div class="wrap"><div class="left">
    <div class="eyebrow">⚡ <b>SHOCKWAVE</b> · impact intelligence for code review</div>
    <h1>Know what a change<br><span class="grad">breaks.</span></h1>
    <p class="sub">Before you merge — straight from the GitLab&nbsp;Orbit knowledge graph.</p>
    <div class="chips">
      <span class="chip">⚡ Blast radius</span>
      <span class="chip cy">🚪 Exposure path</span>
      <span class="chip">✅ Tests to run</span>
      <span class="chip am">🚦 Risk verdict</span>
    </div>
  </div></div>
  <div class="foot"><span class="mark">SHOCK<b>WAVE</b></span><span class="meta">Built on GitLab Orbit · MIT · GitLab Transcend</span></div>
<script>
(function(){
  const svg=d3.select('#map'); const DC=['#FFE6A0','#FF6F5E','#E0479E','#7C84F2'];
  const nodes=[{id:'c',d:0,role:'epi'}]; let k=0;
  const ring=(dep,n,r)=>{for(let i=0;i<n;i++)nodes.push({id:'n'+(k++),d:dep,role:r||'n'})};
  ring(1,8); ring(2,11); ring(3,7);
  nodes.push({id:'e1',d:1,role:'entry'},{id:'e2',d:2,role:'entry'});
  for(let i=0;i<12;i++)nodes.push({id:'t'+i,d:3,role:'test'});
  const links=[],bd={}; nodes.forEach(n=>{(bd[n.d]=bd[n.d]||[]).push(n)});
  nodes.forEach(n=>{if(n.d===0)return;const up=bd[n.d-1]||bd[0];links.push({source:n.id,target:up[(n.id.length*7+n.d*3)%up.length].id})});
  const W=620,H=720,cx=330,cy=360,gap=150;
  const g=svg.append('g');
  for(let i=1;i<=3;i++)g.append('circle').attr('cx',cx).attr('cy',cy).attr('r',i*gap).attr('fill','none').attr('stroke','#16203a');
  const link=g.append('g').selectAll('line').data(links).join('line').attr('stroke','#212C49').attr('stroke-width',1);
  const node=g.append('g').selectAll('circle').data(nodes).join('circle')
    .attr('r',n=>n.role==='epi'?14:(n.role==='entry'?7:(n.role==='test'?3.5:5)))
    .attr('fill',n=>n.role==='test'?'#39B98A':(n.role==='entry'?'#2FE6D6':DC[Math.min(n.d,3)]))
    .attr('opacity',n=>n.role==='test'?.5:1)
    .attr('stroke',n=>n.role==='entry'?'#2FE6D6':'rgba(0,0,0,.35)').attr('stroke-width',n=>n.role==='entry'?2:1)
    .style('filter',n=>n.role==='entry'?'drop-shadow(0 0 8px #2FE6D6)':(n.role==='epi'?'drop-shadow(0 0 16px #FFE6A0)':'none'));
  nodes[0].fx=cx; nodes[0].fy=cy;
  const sim=d3.forceSimulation(nodes)
    .force('link',d3.forceLink(links).id(n=>n.id).distance(gap*.8).strength(.12))
    .force('charge',d3.forceManyBody().strength(-95))
    .force('radial',d3.forceRadial(n=>n.d*gap,cx,cy).strength(.95))
    .force('collide',d3.forceCollide(9))
    .on('tick',()=>{link.attr('x1',l=>l.source.x).attr('y1',l=>l.source.y).attr('x2',l=>l.target.x).attr('y2',l=>l.target.y);node.attr('cx',n=>n.x).attr('cy',n=>n.y)});
  sim.tick(200); sim.stop();
  link.attr('x1',l=>l.source.x).attr('y1',l=>l.source.y).attr('x2',l=>l.target.x).attr('y2',l=>l.target.y);
  node.attr('cx',n=>n.x).attr('cy',n=>n.y);
})();
</script>
</body></html>
