<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Shockwave · Blast Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
  :root{
    --bg:#080B14; --panel:#0E1424; --panel2:#121A2E; --line:#1D2740;
    --text:#E8EDF7; --muted:#8C97B2; --faint:#5C6680;
    --core:#FFE6A0; --d1:#FF6F5E; --d2:#F0529B; --d3:#A85FE6; --d4:#6E78F2;
    --entry:#37E6D8; --test:#33B488; --warn:#FF9A3D;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --disp:'Space Grotesk',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;background:var(--bg);color:var(--text);font-family:var(--disp);
    background-image:radial-gradient(900px 600px at 38% 30%, #101a33 0%, rgba(8,11,20,0) 60%);
    overflow:hidden;
  }
  .wrap{display:grid;grid-template-rows:auto auto 1fr;height:100vh}
  /* ---- header ---- */
  header{display:flex;align-items:baseline;gap:16px;padding:18px 26px 6px}
  .mark{font-weight:700;font-size:22px;letter-spacing:.14em}
  .mark b{color:var(--d1)}
  .tag{font-family:var(--mono);font-size:11px;letter-spacing:.34em;color:var(--muted);text-transform:uppercase}
  .by{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.1em}
  .by a{color:var(--muted);text-decoration:none;border-bottom:1px solid var(--line)}
  /* ---- controls ---- */
  .controls{display:flex;gap:10px;align-items:center;padding:8px 26px 14px;flex-wrap:wrap}
  .field{display:flex;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:0 10px;height:42px}
  .field svg{opacity:.5}
  input,select{background:transparent;border:0;color:var(--text);font-family:var(--mono);font-size:14px;outline:none}
  #seed{width:300px;padding:0 8px}
  .seg{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;height:42px}
  .seg button{background:transparent;border:0;color:var(--muted);font-family:var(--mono);font-size:12px;letter-spacing:.12em;padding:0 16px;cursor:pointer;text-transform:uppercase}
  .seg button[aria-pressed=true]{background:var(--panel2);color:var(--text);box-shadow:inset 0 -2px 0 var(--d1)}
  #hops{width:46px;text-align:center}
  .go{height:42px;padding:0 22px;border:0;border-radius:10px;cursor:pointer;
    font-family:var(--disp);font-weight:600;font-size:14px;letter-spacing:.04em;color:#0A0E18;
    background:linear-gradient(180deg,#FFD27A,#FF6F5E);box-shadow:0 0 0 1px rgba(255,140,90,.4),0 8px 26px rgba(255,90,70,.28)}
  .go:active{transform:translateY(1px)}
  .remote-only{display:none}
  body[data-mode=remote] .remote-only{display:flex}
  #token{width:190px}
  /* ---- main split ---- */
  .main{display:grid;grid-template-columns:1fr 360px;gap:0;min-height:0}
  .stage{position:relative;min-height:0;border-top:1px solid var(--line)}
  .readout{position:absolute;left:22px;top:18px;z-index:5;display:flex;gap:26px;pointer-events:none}
  .stat .n{font-family:var(--mono);font-weight:700;font-size:30px;line-height:1}
  .stat .l{font-family:var(--mono);font-size:10px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;margin-top:4px}
  .stat.exp .n{color:var(--entry)} .stat.hot .n{color:var(--warn)}
  #epi{position:absolute;left:22px;bottom:18px;z-index:5;font-family:var(--mono);font-size:12px;color:var(--muted);pointer-events:none}
  #epi b{color:var(--core);font-weight:500}
  svg#map{width:100%;height:100%;display:block}
  .legend{position:absolute;right:18px;top:16px;z-index:5;display:flex;flex-direction:column;gap:7px;font-family:var(--mono);font-size:10.5px;color:var(--muted);text-align:right}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-left:8px;vertical-align:middle}
  .node{cursor:pointer}
  .node text{font-family:var(--mono);font-size:10px;fill:var(--muted);pointer-events:none}
  .link{stroke:#27314F;stroke-width:1}
  .link.lit{stroke:var(--entry);stroke-width:2;stroke-opacity:.95}
  .ring{fill:none;stroke:#16203a}
  /* ---- rail ---- */
  .rail{background:linear-gradient(180deg,#0C1220,#0A0F1B);border-left:1px solid var(--line);border-top:1px solid var(--line);overflow:auto;padding:18px}
  .rail h2{font-family:var(--mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);margin:0 0 10px;display:flex;align-items:center;gap:8px}
  .rail h2 .c{margin-left:auto;font-size:11px;color:var(--text);background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:1px 9px}
  .ep{padding:9px 0;border-bottom:1px solid var(--line)}
  .ep .top{display:flex;align-items:center;gap:8px}
  .kind{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:20px;border:1px solid var(--line);color:var(--entry)}
  .kind.route{color:var(--entry);border-color:rgba(55,230,216,.4)}
  .kind.api{color:#7FB8FF} .kind.cli{color:#FFC36B} .kind.surface{color:var(--muted)}
  .ep .nm{font-family:var(--mono);font-size:12.5px;color:var(--text);cursor:pointer}
  .ep .nm:hover{color:var(--entry)}
  .ep .path{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5;word-break:break-word}
  .ep .path b{color:var(--d1);font-weight:500}
  .hs{padding:9px 0;border-bottom:1px solid var(--line)}
  .hs .top{display:flex;align-items:center;gap:8px}
  .hs .nm{font-family:var(--mono);font-size:12.5px;color:var(--warn)}
  .hs .meta{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted)}
  .hs details{margin-top:7px}
  .hs summary{font-family:var(--mono);font-size:11px;color:var(--muted);cursor:pointer}
  .hs pre{background:#080C16;border:1px solid var(--line);border-radius:8px;padding:10px;overflow:auto;font-family:var(--mono);font-size:11px;color:#CBD5EE;margin:7px 0 0}
  .empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:13px}
  .empty .big{font-family:var(--disp);font-size:18px;color:var(--text)}
  .empty kbd{font-family:var(--mono);background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:2px 7px;color:var(--text)}
  .err{color:var(--d1)}
  .tip{position:fixed;pointer-events:none;z-index:30;background:#0A0F1C;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-family:var(--mono);font-size:11px;color:var(--text);max-width:280px;opacity:0;transition:opacity .12s}
  .tip .f{color:var(--muted);margin-top:3px}
  .spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:s .7s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){.pulse{display:none}}
</style>
</head>
<body data-mode="local">
<div class="wrap">
  <header>
    <span class="mark">SHOCK<b>WAVE</b></span>
    <span class="tag">Blast Monitor</span>
    <span class="by">impact &amp; exposure on the <a href="https://about.gitlab.com/gitlab-orbit/" target="_blank" rel="noopener">GitLab Orbit</a> graph</span>
  </header>

  <div class="controls">
    <label class="field">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="seed" placeholder="function, class, or file …  e.g. setupmethod" autocomplete="off" spellcheck="false"/>
    </label>
    <div class="seg" role="group" aria-label="Backend">
      <button id="b-local" aria-pressed="true">Local</button>
      <button id="b-remote" aria-pressed="false">Remote</button>
    </div>
    <label class="field remote-only"><input id="url" value="https://gitlab.com" size="16"/></label>
    <label class="field remote-only"><input id="token" type="password" placeholder="GitLab token"/></label>
    <label class="field" title="Max hops">hops&nbsp;<input id="hops" value="4" inputmode="numeric"/></label>
    <button class="go" id="go">Detonate ⚡</button>
  </div>

  <div class="main">
    <div class="stage">
      <div class="readout" id="readout" hidden>
        <div class="stat"><div class="n" id="s-aff">0</div><div class="l">Affected</div></div>
        <div class="stat"><div class="n" id="s-files">0</div><div class="l">Files</div></div>
        <div class="stat hot"><div class="n" id="s-hot">0</div><div class="l">No-test</div></div>
        <div class="stat exp"><div class="n" id="s-exp">0</div><div class="l">Exposed</div></div>
      </div>
      <div class="legend" id="legend" hidden>
        <span>epicenter <i style="background:var(--core)"></i></span>
        <span>depth&nbsp;1–4+ <i style="background:var(--d1)"></i><i style="background:var(--d2)"></i><i style="background:var(--d3)"></i><i style="background:var(--d4)"></i></span>
        <span>entry point <i style="background:var(--entry)"></i></span>
        <span>test <i style="background:var(--test)"></i></span>
      </div>
      <svg id="map" aria-label="Blast map"></svg>
      <div id="epi" hidden></div>
      <div class="empty" id="empty">
        <div class="big">Pick an epicenter.</div>
        <div>Type a symbol and hit <kbd>Detonate</kbd> to see what a change ripples into.</div>
        <div>Index a repo first: <kbd>orbit index .</kbd></div>
      </div>
    </div>

    <aside class="rail">
      <section id="exp-sec" hidden>
        <h2>🚪 Exposure <span class="c" id="exp-c">0</span></h2>
        <div id="exp-list"></div>
      </section>
      <section id="hs-sec" hidden style="margin-top:22px">
        <h2>🔥 Hotspots &amp; tests <span class="c" id="hs-c">0</span></h2>
        <div id="hs-list"></div>
      </section>
    </aside>
  </div>
</div>
<div class="tip" id="tip"></div>

<script>
const $ = s => document.querySelector(s);
const svg = d3.select('#map'), tip = $('#tip');
let mode = 'local';
const DCOLOR = ['var(--core)','#FF6F5E','#F0529B','#A85FE6','#6E78F2'];
const dc = d => DCOLOR[Math.min(d, DCOLOR.length-1)];

$('#b-local').onclick = () => setMode('local');
$('#b-remote').onclick = () => setMode('remote');
function setMode(m){ mode=m; document.body.dataset.mode=m;
  $('#b-local').setAttribute('aria-pressed', m==='local');
  $('#b-remote').setAttribute('aria-pressed', m==='remote'); }

$('#seed').addEventListener('keydown', e => { if(e.key==='Enter') run(); });
$('#go').onclick = run;

async function run(){
  const seed = $('#seed').value.trim();
  if(!seed) return;
  const p = new URLSearchParams({seed, hops:$('#hops').value||'4', backend:mode});
  if(mode==='remote'){ p.set('url',$('#url').value); p.set('token',$('#token').value); }
  const empty = $('#empty');
  empty.hidden = false; empty.innerHTML = '<div class="big"><span class="spin"></span></div><div>Mapping the blast radius…</div>';
  try{
    const r = await fetch('/api/analyze?'+p.toString());
    const data = await r.json();
    if(!r.ok){ empty.hidden=false; empty.innerHTML = '<div class="big err">No blast.</div><div class="err">'+(data.error||'Something went wrong.')+'</div>'; clearAll(); return; }
    empty.hidden = true;
    render(data);
  }catch(e){ empty.innerHTML = '<div class="big err">Server unreachable.</div><div>Is <code>shockwave-web</code> running?</div>'; }
}

function clearAll(){ svg.selectAll('*').remove(); ['readout','legend','epi'].forEach(i=>$('#'+i).hidden=true);
  $('#exp-sec').hidden=true; $('#hs-sec').hidden=true; }

let sim;
function render(d){
  clearAll();
  // readout
  $('#s-aff').textContent = d.summary.affected_definitions;
  $('#s-files').textContent = d.summary.affected_files;
  $('#s-hot').textContent = d.summary.hotspots;
  $('#s-exp').textContent = d.summary.entry_points;
  $('#readout').hidden=false; $('#legend').hidden=false;
  $('#epi').hidden=false; $('#epi').innerHTML = 'EPICENTER&nbsp; <b>'+d.seed+'</b>';

  const W = svg.node().clientWidth, H = svg.node().clientHeight;
  const cx = W/2, cy = H/2;
  const maxD = Math.max(1, d3.max(d.nodes, n=>n.depth) || 1);
  const ringGap = Math.min(W,H)/2.4 / maxD;

  // concentric guide rings
  const g = svg.append('g');
  for(let i=1;i<=maxD;i++) g.append('circle').attr('class','ring').attr('cx',cx).attr('cy',cy).attr('r',i*ringGap);

  // shockwave pulse
  if(!matchMedia('(prefers-reduced-motion: reduce)').matches){
    const pulse = svg.append('circle').attr('class','pulse').attr('cx',cx).attr('cy',cy).attr('r',6)
      .attr('fill','none').attr('stroke','var(--core)').attr('stroke-width',2).attr('opacity',.9);
    pulse.transition().duration(900).ease(d3.easeCubicOut).attr('r',maxD*ringGap+30).attr('opacity',0).remove();
  }

  const nodes = d.nodes.map(n=>({...n}));
  const byId = new Map(nodes.map(n=>[n.id,n]));
  const links = d.links.filter(l=>byId.has(l.source)&&byId.has(l.target)).map(l=>({...l}));
  // parent toward epicenter (a node depends on link.target)
  const parent = new Map();
  links.forEach(l=>{ if(!parent.has(l.source)) parent.set(l.source, l.target); });

  const rOf = n => n.role==='epicenter' ? 13 : 4 + Math.sqrt(n.fan_in||0)*2.2;

  const link = g.append('g').selectAll('line').data(links).join('line').attr('class','link');
  const node = g.append('g').selectAll('g').data(nodes).join('g').attr('class','node');

  node.append('circle')
    .attr('r', rOf)
    .attr('fill', n => n.role==='test' ? 'var(--test)' : dc(n.depth))
    .attr('opacity', n => n.role==='test' ? .5 : 1)
    .attr('stroke', n => n.role==='entry' ? 'var(--entry)' : (n.role==='hotspot' ? 'var(--warn)' : 'rgba(0,0,0,.35)'))
    .attr('stroke-width', n => n.role==='entry'||n.role==='hotspot' ? 2.4 : 1)
    .style('filter', n => n.role==='entry' ? 'drop-shadow(0 0 7px var(--entry))' : (n.role==='epicenter'?'drop-shadow(0 0 12px var(--core))':'none'));

  node.filter(n=>n.role==='epicenter'||n.role==='entry')
    .append('text').attr('x', n=>rOf(n)+5).attr('y',4)
    .text(n=>n.label).attr('fill', n=>n.role==='entry'?'var(--entry)':'var(--core)');

  node.on('mousemove', (e,n)=>{
    tip.style.opacity=1; tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY+14)+'px';
    tip.innerHTML = '<div>'+n.fqn+'</div><div class="f">'+n.file+' · depth '+n.depth+' · fan-in '+n.fan_in+' · '+n.role+'</div>';
    litePath(n.id);
  }).on('mouseleave', ()=>{ tip.style.opacity=0; link.classed('lit',false); });

  function litePath(id){
    const set=new Set(); let cur=id, guard=0;
    while(cur!=null && guard++<40){ const nx=parent.get(cur); if(nx==null) break; set.add(cur+'>'+nx); cur=nx; }
    link.classed('lit', l=>set.has(l.source+'>'+l.target));
  }

  const epi = nodes.find(n=>n.role==='epicenter'); if(epi){ epi.fx=cx; epi.fy=cy; }
  sim && sim.stop();
  sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(n=>n.id).distance(ringGap*.8).strength(.15))
    .force('charge', d3.forceManyBody().strength(-90))
    .force('radial', d3.forceRadial(n=>n.depth*ringGap, cx, cy).strength(.92))
    .force('collide', d3.forceCollide(n=>rOf(n)+3))
    .on('tick', ()=>{
      link.attr('x1',l=>l.source.x).attr('y1',l=>l.source.y).attr('x2',l=>l.target.x).attr('y2',l=>l.target.y);
      node.attr('transform',n=>`translate(${n.x},${n.y})`);
    });

  // ---- rail: exposure ----
  const expSec=$('#exp-sec'), expList=$('#exp-list');
  expList.innerHTML=''; $('#exp-c').textContent=d.exposure.length;
  expSec.hidden = d.exposure.length===0;
  d.exposure.slice(0,40).forEach(ep=>{
    const el=document.createElement('div'); el.className='ep';
    const path = ep.path.map((s,i)=> i===ep.path.length-1 ? '<b>'+s+'</b>' : s).join(' → ');
    el.innerHTML = '<div class="top"><span class="kind '+ep.kind+'">'+ep.kind+'</span><span class="nm" data-fqn="'+ep.entry_point+'">'+ep.entry_point+'</span></div><div class="path">'+path+'</div>';
    el.querySelector('.nm').onclick = ()=>{ const t=nodes.find(n=>n.fqn===ep.entry_point); if(t){ litePath(t.id); setTimeout(()=>link.classed('lit',false),1600);} };
    expList.appendChild(el);
  });

  // ---- rail: hotspots + stubs ----
  const hsSec=$('#hs-sec'), hsList=$('#hs-list');
  const hot = d.affected.filter(a=>a.is_hotspot);
  const stubFor = {}; d.suggested_tests.forEach(s=>stubFor[s.fqn]=s.code);
  hsList.innerHTML=''; $('#hs-c').textContent=hot.length; hsSec.hidden = hot.length===0;
  hot.forEach(a=>{
    const el=document.createElement('div'); el.className='hs';
    const stub = stubFor[a.fqn] ? '<details><summary>suggested test</summary><pre>'+escapeHtml(stubFor[a.fqn])+'</pre></details>' : '';
    el.innerHTML = '<div class="top"><span class="nm">'+a.fqn+'</span><span class="meta">fan-in '+a.fan_in+' · d'+a.depth+'</span></div><div class="path" style="color:var(--muted);font-family:var(--mono);font-size:11px;margin-top:4px">'+a.file_path+'</div>'+stub;
    hsList.appendChild(el);
  });
}
function escapeHtml(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
window.addEventListener('resize', ()=>{ /* keep it simple: rerun on demand */ });
</script>
</body>
</html>
